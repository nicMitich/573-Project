<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>AI Job Assistant</h1>
      <p>Ask questions, explore roles, and refine your career path.</p>
    </header>

    <main class="chat-container">
        <div class="chat-window" id="chat-window">
            <div class="message bot">
                <div class="avatar bot-avatar">AI</div>
                    <div class="bubble">
                        Hi! Share your skills or paste your resume text, and I’ll suggest relevant roles.
                    </div>
            </div>
        </div> 

        <form class="input-bar" id="chat-form">
        <input
        type="text"
        id="user-input"
        placeholder="Type your question or job preferences..."
        autocomplete="off"
        />
        <button type="submit">Send</button>
        </form>
    </main>

    <aside class="sidebar">
      <h2>Recent Searches</h2>
      <ul>
        <li>“Graph-based recommendation roles”</li>
        <li>“Neo4j engineer positions”</li>
        <li>“iOS developer internships”</li>
      </ul>
    </aside>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const chatWindow = document.getElementById('chat-window');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      const msg = document.createElement('div');
      msg.className = 'message user';
      msg.innerHTML = `
        <div class="avatar user-avatar">You</div>
        <div class="bubble">${text}</div>
      `;
      chatWindow.appendChild(msg);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      input.value = '';

      // Placeholder for AI response hook
      // You’d call your backend / LLM API here.
      
    });
  </script>
</body>
</html>
